send_anonymous_usage_stats: true
project_id: "tap-lucca-legacy"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-lucca-legacy"
    namespace: "tap_lucca_legacy"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    # TODO: Declare settings and their types here:
    settings:
    - name: api_key
      label: API key
      description: The API key used to call Lucca legacy API

    - name: api_url
      label: API URL
      description: The url for the API service

    # TODO: Declare default configuration values here:
    config: {}

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
